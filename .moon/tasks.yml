$schema: 'https://moonrepo.dev/schemas/tasks.json'

# Inherited tasks — applied to all projects unless overridden
tasks:
  lint:
    command: 'bunx biome check --no-errors-on-unmatched .'
    inputs:
      - '@globs(sources)'
      - '/biome.jsonc'

  typecheck:
    command: 'bun tsc --noEmit'
    inputs:
      - '@globs(sources)'
      - 'tsconfig*.json'
      - '/tsconfig*.json'

  test:
    command: 'bun test'
    inputs:
      - '@globs(sources)'
      - '@globs(tests)'

  build:
    command: 'bun run build'
    inputs:
      - '@globs(sources)'
    outputs:
      - 'dist'
