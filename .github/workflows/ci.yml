name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: |
          if [ -f bun.lock ]; then
            bun install --frozen-lockfile
          else
            # A newly rendered project intentionally creates its first lock.
            bun install
            test -f bun.lock
          fi

      - name: Validate toolchain contract
        run: bun run toolchain:check

      - name: Validate image contract
        run: bun run image:check

      # capability:start playwright
      - name: Validate browser runtime contract
        run: bun run browser:check
      # capability:end playwright

      - name: Lint
        run: bunx biome check --no-errors-on-unmatched .

      - name: Typecheck
        run: bun tsc --noEmit
        continue-on-error: true # remove once tsconfig is fully wired up

      - name: Test
        run: bun test
        continue-on-error: true # no tests in template; downstream projects should remove this flag

      # template-only:start stage-zero-baseline
      - name: Validate template baseline contract
        run: |
          bun run template:validate
          bun run template:test
          bun run template:typecheck
          bun run template:fixtures "${RUNNER_TEMP}/template-fixtures"
      # template-only:end stage-zero-baseline

  image:
    name: Build devcontainer image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Build selected image target
        run: |
          target="$(jq -r '.build.target' .devcontainer/devcontainer.json)"
          docker build --progress=plain --target "$target" -f .devcontainer/Dockerfile .

  # capability:start playwright
  browser:
    name: Launch baked browser payload
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'
      - name: Prepare browser-enabled project
        shell: bash
        run: |
          set -euo pipefail
          if [ -f template-parameters.toml ]; then
            bun install --frozen-lockfile
            bun run template:fixtures "${RUNNER_TEMP}/template-fixtures"
            project="${RUNNER_TEMP}/template-fixtures/full"
          else
            project="$PWD"
          fi
          cd "$project"
          if [ -f bun.lock ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi
          printf '%s\n' "$project" > "${RUNNER_TEMP}/browser-project"
      - name: Build and launch browser profile
        shell: bash
        run: |
          set -euo pipefail
          project="$(cat "${RUNNER_TEMP}/browser-project")"
          docker build \
            --progress=plain \
            --target development_browser \
            --tag devenv-browser-ci \
            --file "$project/.devcontainer/Dockerfile" \
            "$project"
          docker run --rm \
            --volume "$project:/workspace:ro" \
            --workdir /workspace \
            devenv-browser-ci \
            bun run browser:preflight
  # capability:end playwright
