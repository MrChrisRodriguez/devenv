name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.4'

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bunx biome check --no-errors-on-unmatched .

      - name: Typecheck
        run: bun tsc --noEmit
        continue-on-error: true # remove once tsconfig is fully wired up

      - name: Test
        run: bun test
